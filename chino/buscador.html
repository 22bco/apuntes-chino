<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador de Caracteres · Apuntes Chino — Basti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f2f0; --paper: #fffdfc; --ink: #1c1c1e; --muted: #9a9a9e;
    --red: #c0392b; --red-bright: #e74c3c; --red-soft: #fdecea; --red-tint: #f6d8d3;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  body {
    font-family: 'Noto Sans SC', -apple-system, Arial, sans-serif; color: var(--ink); min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(60% 26% at 100% 0%, rgba(231,76,60,.08), transparent 70%),
      radial-gradient(50% 22% at 0% 0%, rgba(192,57,43,.06), transparent 70%);
    background-repeat: no-repeat;
  }
  .zh, .r-hz { font-family: 'Noto Sans SC', var(--mono); }
  .top-bar { height: 4px; background: linear-gradient(90deg, var(--red), var(--red-bright), #f0a39b); }

  .header { padding: 30px 24px 6px; max-width: 600px; margin: 0 auto; font-family: var(--mono); }
  .header .back { color: var(--red); text-decoration: none; font-size: 0.8rem; }
  .header .back:hover { text-decoration: underline; }
  .header h1 { font-size: 1.45rem; font-weight: 700; margin-top: 12px; letter-spacing: -.3px; }
  .header h1 .zh { color: var(--red); font-weight: 500; font-size: 0.78em; margin-left: 8px; }
  .header p { color: var(--muted); font-size: 0.84rem; margin-top: 6px; }

  .search-area { max-width: 600px; margin: 18px auto 0; padding: 0 24px; }
  .search-box { width: 100%; padding: 14px 20px; font-size: 1.1em; border: 1.5px solid var(--red-tint); border-radius: 12px; outline: none; font-family: inherit; background: var(--paper); transition: border-color .2s, box-shadow .2s; }
  .search-box:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-soft); }
  .search-hint { text-align: center; color: var(--muted); font-size: 0.8em; margin-top: 10px; font-family: var(--mono); line-height: 1.6; }

  .results { max-width: 600px; margin: 18px auto; padding: 0 24px; }
  .result-count { font-size: 0.78rem; color: var(--red); margin-bottom: 12px; font-family: var(--mono); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
  .result-card { background: var(--paper); border: 1px solid #f0e6e3; border-left: 3px solid var(--red-tint); border-radius: 10px; padding: 13px 18px; margin-bottom: 9px; display: flex; align-items: center; gap: 16px; transition: box-shadow .15s, border-left-color .15s, transform .12s; cursor: pointer; }
  .result-card:hover { box-shadow: 0 6px 18px rgba(192,57,43,.1); border-left-color: var(--red); transform: translateY(-1px); }
  .r-hz { font-size: 1.9rem; font-weight: 700; color: var(--red); min-width: 50px; text-align: center; }
  .r-hz a { color: var(--red); text-decoration: none; border-bottom: 1px dotted var(--red-tint); }
  .r-hz a:hover { color: var(--red-bright); }
  .r-info { flex: 1; }
  .r-py { font-size: 1em; font-weight: 600; color: var(--ink); }
  .r-es { font-size: 0.85em; color: var(--muted); margin-top: 1px; }
  .r-source { font-size: 0.72em; color: var(--muted); margin-top: 5px; font-family: var(--mono); }
  .r-source a { color: var(--red); text-decoration: none; border-bottom: 1px dotted var(--red-tint); }
  .r-source a:hover { color: var(--red-bright); border-bottom: 1px solid var(--red-bright); }
  .r-audio { background: none; border: none; font-size: 1.2em; cursor: pointer; opacity: 0.5; transition: opacity .2s; }
  .r-audio:hover { opacity: 1; }
  .empty { text-align: center; color: var(--red-tint); font-size: 1.05em; margin-top: 60px; font-family: var(--mono); }
  mark { background: #ffe6a7; color: var(--ink); border-radius: 3px; padding: 0 1px; font-weight: 700; }
  footer { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 30px 24px; font-family: var(--mono); }
  footer a { color: var(--red); }
  /* responsive-tables */
  @media (max-width: 600px) {
    table { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  }
</style>
</head>
<body>
<div class="top-bar"></div>
<div class="header">
  <a class="back" href="/">← chino.basti.cl</a>
  <h1>🔍 buscador<span class="zh">查找</span></h1>
  <p>Busca por hanzi, pinyin o español en todo el vocabulario.</p>
</div>

<div class="search-area">
  <input type="text" class="search-box" id="searchInput" placeholder="Buscar: 你, ni, hao, tú, hablar..." autofocus>
  <div class="search-hint">📝 No necesitas tildes ni tonos · usa "v" para "ü" (ej: "lv" = lǜ) · click en "📖 Clase X →" para ir a la sección · <span id="count">…</span> palabras</div>
</div>

<div class="results" id="results">
  <div class="empty">Escribe algo para buscar</div>
</div>

<footer>Buscador · Apuntes Chino · <a href="https://basti.cl" style="color:inherit">basti.cl</a></footer>

<script>
(function () {
  'use strict';
  const elInput   = document.getElementById('searchInput');
  const elResults = document.getElementById('results');

  let vocab = [];
  let audioMap = {};

  /* ---------- helpers ---------- */
  const esc = s => String(s).replace(/[&<>"']/g, c =>
    ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  const stripDia = s => String(s).toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  const normalize = s => stripDia(s).replace(/[üǖǘǚǜ]/g, 'u').replace(/v/g, 'u');
  const normNoSpace = s => normalize(s).replace(/\s+/g, '');
  const hasHan = s => /[㐀-鿿]/.test(s);

  /* ---------- carga de datos ---------- */
  Promise.all([
    fetch('/vocab.json').then(r => r.json()),
    fetch('/audio/mapping.json').then(r => r.json()).catch(() => ({})),
  ]).then(([v, m]) => {
    vocab = v; audioMap = m;
    const c = document.getElementById('count');
    if (c) c.textContent = vocab.length;
    if (elInput.value.trim()) doSearch();
  }).catch(() => {
    elResults.innerHTML = '<div class="empty">No se pudo cargar el vocabulario</div>';
  });

  /* ---------- audio (MP3 ElevenLabs con fallback a TTS) ---------- */
  function speak(text) {
    const file = audioMap[text];
    if (file) { new Audio('/audio/' + file).play(); return; }
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'zh-CN'; u.rate = 0.8;
    speechSynthesis.speak(u);
  }

  /* ---------- ranking de relevancia ----------
     0 = mejor (hanzi exacto) … 6 = peor (substring en español); -1 = sin match */
  function score(v, raw) {
    let best = Infinity;
    if (raw && hasHan(raw) && v.hz.includes(raw)) best = Math.min(best, v.hz === raw ? 0 : 1);
    const qpy = normNoSpace(raw);
    if (qpy) {
      const py = normNoSpace(v.py);
      if (py === qpy) best = Math.min(best, 2);
      else if (py.startsWith(qpy)) best = Math.min(best, 3);
      else if (py.includes(qpy)) best = Math.min(best, 4);
    }
    const qes = normalize(raw).trim();
    if (qes) {
      const es = normalize(v.es);
      if (es.startsWith(qes)) best = Math.min(best, 5);
      else if (es.includes(qes)) best = Math.min(best, 6);
    }
    return best === Infinity ? -1 : best;
  }

  /* ---------- resaltado insensible a tildes/tonos ---------- */
  const HL = {
    a:'aáàâäāǎ', e:'eéèêëēě', i:'iíìîïīǐ', o:'oóòôöōǒ',
    u:'uúùûüūǔǖǘǚǜv', n:'nñ', c:'cç',
  };
  function buildRe(query) {
    const q = stripDia(query.trim());
    if (!q) return null;
    let pat = '';
    for (const ch of q) {
      if (ch === 'v') pat += '[' + HL.u + ']';
      else if (HL[ch]) pat += '[' + HL[ch] + ']';
      else if (hasHan(ch)) pat += ch;
      else pat += ch.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    try { return new RegExp(pat, 'gi'); } catch (e) { return null; }
  }
  const hl = (escaped, re) => re ? escaped.replace(re, m => '<mark>' + m + '</mark>') : escaped;

  /* ---------- URL a la clase de origen ---------- */
  function srcToUrl(src, anchor, base) {
    const match = src.match(/Clase (\d+)/i);
    if (!match) return null;
    const num = match[1].padStart(2, '0');
    const dir = base || 'basico2';
    const url = `/${dir}/clase${num}.html`;
    return anchor ? `${url}#${anchor}` : url;
  }

  /* ---------- búsqueda + render ---------- */
  function doSearch() {
    const raw = elInput.value.trim();
    if (!raw) { render([], ''); return; }
    const scored = [];
    for (const v of vocab) {
      const s = score(v, raw);
      if (s >= 0) scored.push([s, v]);
    }
    scored.sort((a, b) => a[0] - b[0] || a[1].py.length - b[1].py.length);
    render(scored.map(x => x[1]), raw);
  }

  function render(results, query) {
    if (!query) { elResults.innerHTML = '<div class="empty">Escribe algo para buscar</div>'; return; }
    if (!results.length) {
      elResults.innerHTML = '<div class="empty">No se encontró "' + esc(query) + '"</div>';
      return;
    }
    const re = buildRe(query);
    let html = `<div class="result-count">${results.length} resultado${results.length > 1 ? 's' : ''}</div>`;
    for (const v of results) {
      const wiki = `https://www.dong-chinese.com/wiki/${encodeURIComponent(v.hz.charAt(0))}`;
      const classUrl = srcToUrl(v.src, v.anchor, v.base);
      const sectionLabel = v.section ? ` · ${esc(v.section)}` : '';
      const sourceHtml = classUrl
        ? `<a href="${classUrl}" onclick="event.stopPropagation()">📖 ${esc(v.src)}${sectionLabel} →</a>`
        : esc(v.src);
      html += `<div class="result-card" data-hz="${esc(v.hz)}">
        <div class="r-hz"><a href="${wiki}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${hl(esc(v.hz), re)}</a></div>
        <div class="r-info">
          <div class="r-py">${hl(esc(v.py), re)}</div>
          <div class="r-es">${hl(esc(v.es), re)}</div>
          <div class="r-source">${sourceHtml}</div>
        </div>
        <button class="r-audio" title="Escuchar">🔊</button>
      </div>`;
    }
    elResults.innerHTML = html;
  }

  /* ---------- eventos ---------- */
  let t = null;
  elInput.addEventListener('input', () => { clearTimeout(t); t = setTimeout(doSearch, 60); });
  elResults.addEventListener('click', e => {
    const card = e.target.closest('[data-hz]');
    if (card) speak(card.dataset.hz);
  });
})();
</script>
</body>
</html>
