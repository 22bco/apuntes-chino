<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listening Practice · Apuntes Chino — Basti</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f2f0; --paper: #fffdfc; --ink: #1c1c1e; --muted: #9a9a9e;
    --red: #c0392b; --red-bright: #e74c3c; --red-soft: #fdecea; --red-tint: #f6d8d3;
    --green: #2f8f4e;
    --mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
  }
  body {
    font-family: 'Noto Sans SC', -apple-system, Arial, sans-serif; color: var(--ink); min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(60% 26% at 100% 0%, rgba(231,76,60,.08), transparent 70%),
      radial-gradient(50% 22% at 0% 0%, rgba(192,57,43,.06), transparent 70%);
    background-repeat: no-repeat;
  }
  .zh { font-family: 'Noto Sans SC', var(--mono); }
  .top-bar { height: 4px; background: linear-gradient(90deg, var(--red), var(--red-bright), #f0a39b); }

  .header { padding: 30px 24px 6px; max-width: 560px; margin: 0 auto; font-family: var(--mono); }
  .header .back { color: var(--red); text-decoration: none; font-size: 0.8rem; }
  .header .back:hover { text-decoration: underline; }
  .header h1 { font-size: 1.45rem; font-weight: 700; margin-top: 12px; letter-spacing: -.3px; }
  .header h1 .zh { color: var(--red); font-weight: 500; font-size: 0.78em; margin-left: 8px; }
  .header p { color: var(--muted); font-size: 0.84rem; margin-top: 6px; }

  /* Filtros */
  .filters { display: flex; justify-content: center; gap: 8px; padding: 16px 24px 8px; flex-wrap: wrap; }
  .filter-btn { padding: 7px 16px; border-radius: 8px; border: 1px solid var(--red-tint); background: var(--red-soft); color: var(--red); cursor: pointer; font-size: 0.82em; font-weight: 500; font-family: var(--mono); transition: all .15s; }
  .filter-btn:hover { border-color: var(--red); transform: translateY(-1px); }
  .filter-btn.active { background: var(--red); color: #fff; border-color: var(--red); box-shadow: 0 4px 12px rgba(192,57,43,.25); }

  /* Modo */
  .mode-bar { display: flex; justify-content: center; gap: 8px; padding: 0 24px 16px; flex-wrap: wrap; }
  .mode-btn { padding: 5px 14px; border-radius: 8px; border: 1px solid #e5ddda; background: var(--paper); color: var(--muted); cursor: pointer; font-size: 0.78em; font-family: var(--mono); transition: all .15s; }
  .mode-btn:hover { border-color: var(--red); color: var(--red); }
  .mode-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* Stats */
  .stats { text-align: center; padding: 0 24px 16px; font-size: 0.86em; color: var(--muted); font-family: var(--mono); max-width: 520px; margin: 0 auto; }
  .stats strong { color: var(--red); }
  .stats .correct { color: var(--green); }
  .stats .wrong { color: var(--red-bright); }

  /* Area principal */
  .main-area { max-width: 520px; margin: 0 auto; padding: 0 24px 40px; }

  /* Play button */
  .play-area { text-align: center; margin: 20px 0; }
  .play-btn { width: 120px; height: 120px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--red-bright), var(--red)); color: #fff; font-size: 3em; cursor: pointer; box-shadow: 0 8px 30px rgba(192,57,43,.32); transition: all .2s; }
  .play-btn:hover { transform: scale(1.05); box-shadow: 0 12px 40px rgba(192,57,43,.42); }
  .play-btn:active { transform: scale(0.97); }
  .play-hint { color: var(--muted); font-size: 0.82em; margin-top: 10px; font-family: var(--mono); }
  .speed-control { margin-top: 12px; display: flex; justify-content: center; gap: 6px; }
  .speed-btn { padding: 4px 12px; border-radius: 8px; border: 1px solid #e5ddda; background: var(--paper); cursor: pointer; font-size: 0.75em; font-family: var(--mono); transition: all .15s; }
  .speed-btn.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* Input area */
  .input-area { margin: 24px 0; text-align: center; }
  .answer-input { width: 100%; padding: 14px 18px; border: 1.5px solid var(--red-tint); border-radius: 12px; font-size: 1.1em; font-family: 'Noto Sans SC', sans-serif; text-align: center; background: var(--paper); transition: border-color .2s, box-shadow .2s; outline: none; }
  .answer-input:focus { border-color: var(--red); box-shadow: 0 0 0 3px var(--red-soft); }
  .answer-input.correct { border-color: var(--green); background: #f0fff4; }
  .answer-input.wrong { border-color: var(--red-bright); background: #fff5f5; }
  .input-hint { color: var(--muted); font-size: 0.78em; margin-top: 8px; font-family: var(--mono); }

  /* Botones de accion */
  .actions { display: flex; justify-content: center; gap: 10px; margin: 16px 0; }
  .btn { padding: 10px 24px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.88em; font-weight: 600; font-family: var(--mono); transition: all .15s; }
  .btn-check { background: var(--red); color: #fff; }
  .btn-check:hover { background: #a93226; }
  .btn-next { background: var(--ink); color: #fff; }
  .btn-next:hover { background: #000; }
  .btn-skip { background: var(--paper); color: var(--muted); border: 1px solid #e5ddda; }
  .btn-skip:hover { border-color: var(--red); color: var(--red); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Resultado */
  .result { margin: 20px 0; padding: 18px 20px; border-radius: 12px; display: none; }
  .result.show { display: block; }
  .result.correct { background: #e7f7ec; border: 1.5px solid var(--green); }
  .result.wrong { background: var(--red-soft); border: 1.5px solid var(--red-bright); }
  .result-title { font-weight: 700; font-size: 1em; margin-bottom: 8px; font-family: var(--mono); }
  .result.correct .result-title { color: var(--green); }
  .result.wrong .result-title { color: var(--red-bright); }
  .result-hanzi { font-size: 2em; font-weight: 700; color: var(--ink); }
  .result-pinyin { font-size: 1.1em; color: var(--red); margin-top: 4px; }
  .result-es { font-size: 0.95em; color: #666; margin-top: 4px; }
  .result-clase { font-size: 0.72em; color: var(--muted); margin-top: 8px; font-family: var(--mono); }

  /* Progress bar */
  .progress-bar { height: 4px; background: #efe6e3; border-radius: 2px; margin: 0 0 8px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--red), var(--red-bright)); transition: width .3s; border-radius: 2px; }

  /* Historial */
  .history { margin-top: 32px; }
  .history h3 { font-size: 0.74em; text-transform: uppercase; letter-spacing: 1.2px; color: var(--red); margin-bottom: 10px; font-family: var(--mono); font-weight: 700; }
  .history-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: var(--paper); border-radius: 10px; margin-bottom: 6px; border: 1px solid #f0e6e3; font-size: 0.88em; }
  .history-icon { font-size: 1.2em; }
  .history-hz { font-weight: 700; color: var(--ink); font-size: 1.1em; }
  .history-py { color: var(--red); font-size: 0.85em; }
  .history-answer { color: var(--muted); font-size: 0.8em; margin-left: auto; font-family: var(--mono); }

  footer { text-align: center; color: var(--muted); font-size: 0.78rem; padding: 24px; font-family: var(--mono); }
  footer a { color: var(--red); }

  @media (max-width: 480px) {
    .play-btn { width: 100px; height: 100px; font-size: 2.5em; }
    .result-hanzi { font-size: 1.6em; }
  }
  /* responsive-tables */
  @media (max-width: 600px) {
    table { display: block; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  }
</style>
</head>
<body>

<div class="top-bar"></div>
<div class="header">
  <a class="back" href="/">← chino.basti.cl</a>
  <h1>🎧 listening<span class="zh">听力</span></h1>
  <p>Escucha el audio y escribe lo que oyes (en pinyin o hanzi).</p>
</div>

<div class="filters">
  <button class="filter-btn active" data-filter="all">Todas</button>
  <button class="filter-btn" data-filter="basico1">Basico 1</button>
  <button class="filter-btn" data-filter="basico2">Basico 2</button>
</div>
<div class="filters" style="padding-top:0;">
  <button class="filter-btn sub-filter" data-filter="cap01">B1 Cap 01</button>
  <button class="filter-btn sub-filter" data-filter="cap02">B1 Cap 02</button>
  <button class="filter-btn sub-filter" data-filter="cap03">B1 Cap 03</button>
  <button class="filter-btn sub-filter" data-filter="cap04">B1 Cap 04</button>
  <button class="filter-btn sub-filter" data-filter="cap05">B1 Cap 05</button>
  <button class="filter-btn sub-filter" data-filter="cap06">B1 Cap 06</button>
  <button class="filter-btn sub-filter" data-filter="cap07">B1 Cap 07</button>
  <button class="filter-btn sub-filter" data-filter="cap08">B1 Cap 08</button>
  <button class="filter-btn sub-filter" data-filter="cap09">B1 Cap 09</button>
  <button class="filter-btn sub-filter" data-filter="cap10">B1 Cap 10</button>
  <button class="filter-btn sub-filter" data-filter="clase01">B2 Clase 01</button>
  <button class="filter-btn sub-filter" data-filter="clase02">B2 Clase 02</button>
  <button class="filter-btn sub-filter" data-filter="clase03">B2 Clase 03</button>
  <button class="filter-btn sub-filter" data-filter="clase04">B2 Clase 04</button>
</div>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="all">Todo</button>
  <button class="mode-btn" data-mode="words">Palabras</button>
  <button class="mode-btn" data-mode="phrases">Frases</button>
</div>

<div class="main-area">
  <div class="stats">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    Pregunta <strong id="questionNum">0</strong> ·
    <span class="correct" id="correctCount">0</span> correctas ·
    <span class="wrong" id="wrongCount">0</span> incorrectas ·
    <span id="accuracy">0%</span>
  </div>

  <div class="play-area">
    <button class="play-btn" id="playBtn" title="Reproducir audio">🔊</button>
    <div class="play-hint">Haz clic para escuchar</div>
    <div class="speed-control">
      <button class="speed-btn" data-speed="0.6">Lento</button>
      <button class="speed-btn active" data-speed="1">Normal</button>
    </div>
  </div>

  <div class="input-area">
    <input type="text" class="answer-input" id="answerInput" placeholder="Escribe en pinyin o hanzi..." autocomplete="off" spellcheck="false">
    <div class="input-hint">Presiona Enter para verificar</div>
  </div>

  <div class="actions">
    <button class="btn btn-check" id="checkBtn">Verificar</button>
    <button class="btn btn-skip" id="skipBtn">Saltar</button>
    <button class="btn btn-next" id="nextBtn" style="display:none">Siguiente</button>
  </div>

  <div class="result" id="result">
    <div class="result-title" id="resultTitle"></div>
    <div class="result-hanzi" id="resultHanzi"></div>
    <div class="result-pinyin" id="resultPinyin"></div>
    <div class="result-es" id="resultEs"></div>
    <div class="result-clase" id="resultClase"></div>
  </div>

  <div class="history" id="historySection" style="display:none">
    <h3>Historial</h3>
    <div id="historyList"></div>
  </div>
</div>

<footer>Listening Practice · Apuntes Chino · <a href="https://basti.cl" style="color:inherit">basti.cl</a></footer>

<script>
const AUDIO_BASE = '/audio/';
let vocab = [];
let filtered = [];
let current = null;
let answered = false;
let stats = { total: 0, correct: 0, wrong: 0 };
let history = [];
let playbackSpeed = 1;
let currentFilter = 'all';
let currentMode = 'all';

// Load vocab data
fetch('/audio/vocab_listening.json')
  .then(r => r.json())
  .then(data => {
    vocab = data;
    applyFilters();
    loadNext();
  });

function applyFilters() {
  filtered = vocab.filter(item => {
    if (currentFilter === 'all') { /* pass */ }
    else if (currentFilter === 'basico1') { if (!item.clase.startsWith('cap')) return false; }
    else if (currentFilter === 'basico2') { if (!item.clase.startsWith('clase')) return false; }
    else if (currentFilter !== item.clase) return false;
    if (currentMode === 'words' && item.hanzi.length > 3) return false;
    if (currentMode === 'phrases' && item.hanzi.length <= 3) return false;
    return true;
  });
  // Shuffle
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
}

function normalize(str) {
  return str.toLowerCase()
    .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
    .replace(/[。？，！、：\s]/g, '')
    .replace(/v/g, 'u')  // common pinyin substitution
    .trim();
}

function loadNext() {
  if (filtered.length === 0) {
    applyFilters();
    if (filtered.length === 0) return;
  }
  current = filtered.pop();
  answered = false;

  document.getElementById('answerInput').value = '';
  document.getElementById('answerInput').className = 'answer-input';
  document.getElementById('answerInput').disabled = false;
  document.getElementById('result').className = 'result';
  document.getElementById('checkBtn').style.display = '';
  document.getElementById('skipBtn').style.display = '';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('answerInput').focus();
}

function playAudio() {
  if (!current) return;
  const audio = new Audio(AUDIO_BASE + current.audio);
  audio.playbackRate = playbackSpeed;
  audio.play();
}

function checkAnswer() {
  if (!current || answered) return;
  answered = true;
  stats.total++;

  const userAnswer = document.getElementById('answerInput').value.trim();
  const input = document.getElementById('answerInput');
  const result = document.getElementById('result');

  // Check against hanzi and pinyin (normalized)
  const normalizedAnswer = normalize(userAnswer);
  const normalizedHanzi = normalize(current.hanzi);
  const normalizedPinyin = normalize(current.pinyin);

  const isCorrect = normalizedAnswer === normalizedHanzi || normalizedAnswer === normalizedPinyin;

  if (isCorrect) {
    stats.correct++;
    input.className = 'answer-input correct';
    result.className = 'result correct show';
    document.getElementById('resultTitle').textContent = 'Correcto!';
  } else {
    stats.wrong++;
    input.className = 'answer-input wrong';
    result.className = 'result wrong show';
    document.getElementById('resultTitle').textContent = 'Incorrecto';
  }

  input.disabled = true;
  document.getElementById('resultHanzi').textContent = current.hanzi;
  document.getElementById('resultPinyin').textContent = current.pinyin;
  document.getElementById('resultEs').textContent = current.espanol;
  document.getElementById('resultClase').textContent = current.clase.replace('clase0', 'Clase ');

  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';

  // Update stats
  document.getElementById('questionNum').textContent = stats.total;
  document.getElementById('correctCount').textContent = stats.correct;
  document.getElementById('wrongCount').textContent = stats.wrong;
  const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
  document.getElementById('accuracy').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  // History
  history.unshift({ hanzi: current.hanzi, pinyin: current.pinyin, answer: userAnswer, correct: isCorrect });
  renderHistory();

  // Auto-play audio to reinforce
  playAudio();
}

function skipQuestion() {
  if (!current || answered) return;
  document.getElementById('answerInput').value = '';
  answered = true;
  stats.total++;
  stats.wrong++;

  const result = document.getElementById('result');
  result.className = 'result wrong show';
  document.getElementById('resultTitle').textContent = 'Saltada';
  document.getElementById('resultHanzi').textContent = current.hanzi;
  document.getElementById('resultPinyin').textContent = current.pinyin;
  document.getElementById('resultEs').textContent = current.espanol;
  document.getElementById('resultClase').textContent = current.clase.replace('clase0', 'Clase ');

  document.getElementById('answerInput').disabled = true;
  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('skipBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = '';

  document.getElementById('questionNum').textContent = stats.total;
  document.getElementById('correctCount').textContent = stats.correct;
  document.getElementById('wrongCount').textContent = stats.wrong;
  const pct = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : 0;
  document.getElementById('accuracy').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';

  history.unshift({ hanzi: current.hanzi, pinyin: current.pinyin, answer: '(saltada)', correct: false });
  renderHistory();
  playAudio();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const list = document.getElementById('historyList');
  section.style.display = history.length > 0 ? '' : 'none';
  list.innerHTML = history.slice(0, 10).map(h => `
    <div class="history-item">
      <span class="history-icon">${h.correct ? '✅' : '❌'}</span>
      <span class="history-hz">${h.hanzi}</span>
      <span class="history-py">${h.pinyin}</span>
      <span class="history-answer">${h.answer}</span>
    </div>
  `).join('');
}

// Event listeners
document.getElementById('playBtn').addEventListener('click', playAudio);
document.getElementById('checkBtn').addEventListener('click', checkAnswer);
document.getElementById('skipBtn').addEventListener('click', skipQuestion);
document.getElementById('nextBtn').addEventListener('click', loadNext);

document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (answered) loadNext();
    else checkAnswer();
  }
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
    loadNext();
  });
});

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    applyFilters();
    loadNext();
  });
});

// Speed buttons
document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    playbackSpeed = parseFloat(btn.dataset.speed);
  });
});

// Keyboard shortcut: space to replay
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && document.activeElement.id !== 'answerInput') {
    e.preventDefault();
    playAudio();
  }
});
</script>
</body>
</html>
