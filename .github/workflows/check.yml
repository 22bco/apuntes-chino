name: Check site integrity

# Valida integridad del sitio en cada push/PR. NO despliega (eso lo hace deploy.yml).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validar integridad (links, audio, hsk1, json, secretos)
        run: python3 scripts/check_site.py
